<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>商家数据 · AR游伴园区后台</title>
  <link rel="stylesheet" href="../../shared/backoffice.css" />
</head>
<body>
  <div class="bo-app">
    <div id="bo-topnav"></div>
    <div class="bo-body">
      <div id="bo-sidebar"></div>
      <main class="bo-content">
        <div id="bo-breadcrumb"></div>
        <div class="bo-page-header"><h2>商家数据看板</h2><p>查看入驻商家参与表现与协作效果</p></div>

        <div class="bo-section-side-note">商家数据看板展示园区入驻商家整体表现。活动内各商家礼遇与核销明细请见<a href="../park_admin_activity_detail/index.html#merchant-detail-section">活动详情 · 参与商家明细</a>。</div>

        <div class="bo-park-summary">
          <div class="bo-park-summary__title">商家参与摘要</div>
          <div class="bo-park-summary__copy">商家总数 8 家 · 活跃商家 6 家 · 平均核销率 34%</div>
        </div>

        <div class="bo-park-kpi-grid" style="grid-template-columns:repeat(3,minmax(0,1fr));">
          <div class="bo-metric-card"><div class="bo-metric-card__label">商家总数</div><div class="bo-metric-card__value">8</div></div>
          <div class="bo-metric-card"><div class="bo-metric-card__label">活跃商家</div><div class="bo-metric-card__value">6</div></div>
          <div class="bo-metric-card bo-metric-card--highlight"><div class="bo-metric-card__label">平均核销率</div><div class="bo-metric-card__value">34%</div></div>
        </div>

        <div class="grid" style="margin-bottom:16px;">
          <section class="card span-6">
            <h3 class="card-title">表现较好</h3>
            <div class="bo-park-ranking">
              <div class="bo-park-ranking__item">
                <div><div class="bo-park-ranking__name">爱企谷咖啡</div><div class="bo-park-ranking__meta">核销率 38% · 参与活动 2</div></div>
                <span class="bo-park-health-tag">表现较好</span>
              </div>
            </div>
          </section>
          <section class="card span-6">
            <h3 class="card-title">需要关注</h3>
            <div class="bo-park-ranking">
              <div class="bo-park-ranking__item">
                <div><div class="bo-park-ranking__name">探索书屋</div><div class="bo-park-ranking__meta">核销率 14% · 领取高核销低</div></div>
                <span class="badge badge-warning">需关注</span>
              </div>
            </div>
            <div class="bo-park-suggestion" style="margin-top:12px;">
              <strong>协作提醒</strong>
              建议与商家沟通到店引导，提升探索礼遇核销转化。
            </div>
          </section>
        </div>

        <section class="card">
          <h3 class="card-title">商家数据列表</h3>
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th>商家</th><th>业态</th><th>参与活动</th><th>发放</th><th>领取</th><th>核销</th><th>核销率</th><th>联系人</th><th>操作</th></tr></thead>
              <tbody id="merchant-table-body"></tbody>
            </table>
          </div>
          <div class="toolbar" id="merchant-pager" style="margin-top:12px;"></div>
        </section>
      </main>
    </div>
  </div>
  <script src="../../shared/backoffice-shell.js"></script>
  <script src="../shared/park-adapter-boot.js"></script>
  <script src="../shared/status-labels.js"></script>
  <script src="../shared/platform-park-view.js"></script>
  <script src="../shared/page-boot.js"></script>
  <script>
    ParkPageBoot.boot("merchants", [{ label: "园区管理" }, { label: "商家数据" }]);

    ParkAdapterBoot.ensureAdapterScripts(function () {
      var ctx = ParkAdapterBoot.getParkContext();
      var adapter = ParkAdapterBoot.getAdapter();
      var currentPage = 1;

      function renderPage(page) {
        currentPage = page;
        var data = adapter.getParkMerchants(ctx.parkId, { page: page, pageSize: 10 });
        var tbody = document.getElementById("merchant-table-body");
        tbody.innerHTML = data.items.map(function (row) {
          var m = row.merchant;
          var couponName = row.coupons[0] ? row.coupons[0].name : "—";
          return "<tr><td>" + row.name + "</td><td>" + row.category +
            "</td><td>" + row.activityCount + "</td><td>" + row.issued +
            "</td><td>" + row.claimed + "</td><td>" + row.redeemed +
            "</td><td>" + row.redemptionRate + "</td><td>" +
            (row.contactName || "—") + " · " + (row.contactPhone || "—") +
            '</td><td><a class="btn" href="../park_admin_activity_detail/index.html#merchant-detail-section">' +
            couponName + "</a></td></tr>";
        }).join("");

        var pager = document.getElementById("merchant-pager");
        var totalPages = Math.max(1, Math.ceil(data.total / data.pageSize));
        pager.innerHTML = totalPages > 1
          ? '<span class="text-muted">第 ' + page + " / " + totalPages + " 页 · 共 " + data.total + " 家</span>"
          : '<span class="text-muted">共 ' + data.total + " 家商家</span>";
        if (page > 1) pager.innerHTML += ' <button class="btn" type="button" id="merchant-prev">上一页</button>';
        if (page < totalPages) pager.innerHTML += ' <button class="btn" type="button" id="merchant-next">下一页</button>';
        var prev = document.getElementById("merchant-prev");
        var next = document.getElementById("merchant-next");
        if (prev) prev.addEventListener("click", function () { renderPage(page - 1); });
        if (next) next.addEventListener("click", function () { renderPage(page + 1); });
      }

      renderPage(1);
    });
  </script>
</body>
</html>
