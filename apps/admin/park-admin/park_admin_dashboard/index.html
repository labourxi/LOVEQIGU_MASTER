<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>运营总览 · AR游伴园区管理</title>
  <link rel="stylesheet" href="../../shared/backoffice.css" />
</head>
<body>
  <div class="bo-app">
    <div id="bo-topnav"></div>
    <div class="bo-body">
      <div id="bo-sidebar"></div>
      <main class="bo-content">
        <div id="bo-breadcrumb"></div>
        <div class="bo-page-header-row">
          <div class="bo-page-header"><h2>爱企谷 · 运营总览</h2><p>园区活动与商家协同（Mock）</p></div>
          <a class="btn btn-primary" href="../park_admin_activity_new/index.html">创建活动</a>
        </div>
        <div class="grid">
          <section class="card metric"><div class="metric-label">进行中活动</div><div class="metric-value">1</div></section>
          <section class="card metric"><div class="metric-label">入驻商家</div><div class="metric-value">8</div></section>
          <section class="card metric"><div class="metric-label">待发布检查</div><div class="metric-value">1</div></section>
          <section class="card metric"><div class="metric-label">待处理工单</div><div class="metric-value">2</div></section>
          <section class="card span-8">
            <h3 class="card-title">活动状态</h3>
            <div class="table-wrap">
              <table class="table">
                <thead><tr><th>活动</th><th>审核</th><th>发布检查</th><th>操作</th></tr></thead>
                <tbody>
                  <tr><td>爱企谷初见寻宝节</td><td><span class="badge badge-warning">待审核</span></td><td><span class="badge badge-danger">已阻断</span></td><td><a class="btn" href="../park_admin_activities/index.html">查看</a></td></tr>
                  <tr><td>爱企谷夏日探索</td><td><span class="badge badge-success">已通过</span></td><td><span class="badge badge-success">就绪</span></td><td><a class="btn" href="../park_admin_activity_publish_check/index.html">发布检查</a></td></tr>
                </tbody>
              </table>
            </div>
          </section>
          <section class="card span-4">
            <h3 class="card-title">快捷入口</h3>
            <div class="toolbar" style="flex-direction:column;align-items:stretch;">
              <a class="btn btn-primary" href="../park_admin_activity_new/index.html">创建活动</a>
              <a class="btn" href="../park_admin_merchants/index.html">商家管理</a>
              <a class="btn" href="../park_admin_tickets/index.html">工单</a>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>
  <script src="../../shared/backoffice-shell.js"></script>
  <script src="../shared/page-boot.js"></script>
  <script>ParkPageBoot.boot("dashboard", [{ label: "园区管理" }, { label: "运营总览" }]);</script>
</body>
</html>
