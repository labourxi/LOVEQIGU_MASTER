<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>工单 · AR游伴园区后台</title>
  <link rel="stylesheet" href="../../shared/backoffice.css" />
</head>
<body>
  <div class="bo-app">
    <div id="bo-topnav"></div>
    <div class="bo-body">
      <div id="bo-sidebar"></div>
      <main class="bo-content">
        <div id="bo-breadcrumb"></div>
        <div class="bo-page-header-row">
          <div class="bo-page-header"><h2>工单</h2><p>活动协作、商家协同问题可在此联系平台</p></div>
          <button class="btn btn-primary" type="button" id="new-ticket-btn">新建工单</button>
        </div>

        <div class="bo-section-side-note">工单用于园区与平台之间的合作支持，不是内部审批流程。提交后平台将尽快回复。</div>

        <section class="card">
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th>标题</th><th>类型</th><th>关联活动</th><th>状态</th><th>提交时间</th><th>平台回复</th></tr></thead>
              <tbody>
                <tr>
                  <td>活动发布审核进度咨询</td>
                  <td><span class="badge badge-accent">活动问题</span></td>
                  <td>爱企谷初见寻宝节</td>
                  <td><span class="badge badge-warning">待处理</span></td>
                  <td>2026-06-15 09:30</td>
                  <td><span class="badge badge-accent">已回复</span></td>
                </tr>
                <tr>
                  <td>商家核销数据异常</td>
                  <td><span class="badge badge-accent">商家协同</span></td>
                  <td>爱企谷初见寻宝节</td>
                  <td><span class="badge badge-warning">待处理</span></td>
                  <td>2026-06-14 16:20</td>
                  <td><span class="badge badge-neutral">待回复</span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="card" style="margin-top:16px;">
          <h3 class="card-title">工单相关操作记录</h3>
          <div class="bo-audit-log" id="ticket-operation-logs"></div>
        </section>

        <div class="bo-park-suggestion" style="margin-top:16px;">
          <strong>常见问题</strong>
          活动发布、商家协同、数据核对等问题均可提交工单。紧急事项请备注活动名称与商家名称。更多说明请查看<a href="../park_admin_help/index.html">帮助中心</a>。
        </div>
      </main>
    </div>
  </div>
  <script src="../../shared/backoffice-shell.js"></script>
  <script src="../shared/status-labels.js"></script>
  <script src="../shared/park-operation-log.js"></script>
  <script src="../shared/page-boot.js"></script>
  <script>
    ParkPageBoot.boot("tickets", [{ label: "园区管理" }, { label: "工单" }]);

    ParkOperationLog.ensureSeed();
    ParkOperationLog.renderTimeline(
      document.getElementById("ticket-operation-logs"),
      ParkOperationLog.getLogs({ actionTypes: ["提交工单咨询"], limit: 5 })
    );

    var params = new URLSearchParams(window.location.search);
    if (params.get("action") === "assist") {
      document.querySelector(".bo-section-side-note").textContent +=
        " 您可从活动详情进入「申请平台协助」，请说明活动名称与需协助事项。";
    }

    document.getElementById("new-ticket-btn").addEventListener("click", function () {
      ParkOperationLog.appendLog({
        actionType: "提交工单咨询",
        beforeStatus: "进行中",
        afterStatus: "进行中",
        summary: "新建工单：活动协作咨询（Mock 占位）。",
        sourcePage: "park_admin_tickets"
      });
      ParkOperationLog.renderTimeline(
        document.getElementById("ticket-operation-logs"),
        ParkOperationLog.getLogs({ actionTypes: ["提交工单咨询"], limit: 5 })
      );
      alert("Mock：工单已提交，操作日志已记录。");
    });
  </script>
</body>
</html>
