<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>创建活动 · AR游伴园区后台</title>
  <link rel="stylesheet" href="../../shared/backoffice.css" />
</head>
<body>
  <div class="bo-app">
    <div id="bo-topnav"></div>
    <div class="bo-body">
      <div id="bo-sidebar"></div>
      <main class="bo-content">
        <div id="bo-breadcrumb"></div>
        <div class="bo-page-header"><h2>创建活动</h2><p>轻量创建活动草稿，复杂配置由平台协同完成</p></div>

        <div class="bo-section-side-note">园区负责人可填写活动基础信息与协作商家，详细内容生产与审核由平台侧处理。</div>

        <section class="card" style="max-width:720px;" id="form-panel">
          <form id="activity-form">
            <div class="form-group">
              <label for="act-name">活动名称</label>
              <input class="input" id="act-name" type="text" value="爱企谷首场探索活动" />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="act-start">开始时间</label>
                <input class="input" id="act-start" type="text" value="2026-06-20" />
              </div>
              <div class="form-group">
                <label for="act-end">结束时间</label>
                <input class="input" id="act-end" type="text" value="2026-06-30" />
              </div>
            </div>
            <div class="form-group">
              <label for="act-merchants">关联商家</label>
              <select class="input" id="act-merchants" multiple size="4"></select>
              <p class="text-muted" style="margin:6px 0 0;font-size:12px;">按住 Ctrl 可多选（Mock）</p>
            </div>
            <div class="form-group">
              <label for="act-points">关联探索点</label>
              <select class="input" id="act-points" multiple size="3"></select>
            </div>
            <div class="form-group">
              <label for="act-desc">活动说明</label>
              <textarea class="input" id="act-desc" rows="3">游客完成园区探索后可领取在地礼遇，联动入驻商家承接。</textarea>
            </div>

            <div class="bo-declaration-card bo-submit-guard" id="declaration-section" style="margin:16px 0;">
              <h3 class="bo-declaration-card__title">提交前确认</h3>
              <label class="bo-declaration-check">
                <input type="checkbox" class="decl-check" data-idx="0" />
                <span id="decl-text-0"></span>
              </label>
              <label class="bo-declaration-check">
                <input type="checkbox" class="decl-check" data-idx="1" />
                <span id="decl-text-1"></span>
              </label>
              <label class="bo-declaration-check">
                <input type="checkbox" class="decl-check" data-idx="2" />
                <span id="decl-text-2"></span>
              </label>
              <p class="bo-declaration-text" id="decl-footer"></p>
            </div>

            <div class="form-actions" style="border:0;padding-top:0;margin-top:0;justify-content:flex-start;">
              <button class="btn btn-primary" type="submit">保存草稿</button>
              <button class="btn" type="button" id="submit-review-btn" disabled>提交发布检查</button>
              <a class="btn" href="../park_admin_activities/index.html">取消</a>
            </div>
          </form>
        </section>

        <section class="card hidden" style="max-width:720px;" id="success-panel">
          <div class="alert alert-success" id="success-message">活动草稿已保存</div>
          <p>状态：<span class="badge badge-neutral" id="success-status">草稿</span></p>
          <div class="toolbar">
            <a class="btn btn-primary" href="#" id="success-detail-link">查看活动详情</a>
            <a class="btn" href="../park_admin_activity_publish_check/index.html" id="success-check-link">发布检查</a>
            <a class="btn" href="../park_admin_activities/index.html">返回活动数据</a>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="../../shared/backoffice-shell.js"></script>
  <script src="../shared/park-adapter-boot.js"></script>
  <script src="../shared/status-labels.js"></script>
  <script src="../shared/page-boot.js"></script>
  <script>
    ParkPageBoot.boot("activity_create", [{ label: "园区管理" }, { label: "创建活动" }]);

    ParkAdapterBoot.ensureAdapterScripts(function () {
      var ctx = ParkAdapterBoot.getParkContext();
      var adapter = ParkAdapterBoot.getAdapter();
      var draftCtx = adapter.getParkActivityDraftContext(ctx.parkId);
      var savedActivityId = null;

      var merchantSel = document.getElementById("act-merchants");
      draftCtx.merchants.forEach(function (m) {
        var opt = document.createElement("option");
        opt.value = m.id;
        opt.textContent = m.name + "（" + m.category + "）";
        merchantSel.appendChild(opt);
      });

      var pointSel = document.getElementById("act-points");
      draftCtx.explorationPoints.forEach(function (p) {
        var opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = p.name;
        pointSel.appendChild(opt);
      });

      draftCtx.declarationItems.forEach(function (text, i) {
        var el = document.getElementById("decl-text-" + i);
        if (el) el.textContent = text;
      });
      document.getElementById("decl-footer").textContent = draftCtx.declarationFooter;

      function selectedIds(sel) {
        return Array.prototype.slice.call(sel.selectedOptions).map(function (o) { return o.value; });
      }

      function buildPayload() {
        return {
          parkId: ctx.parkId,
          id: savedActivityId,
          name: document.getElementById("act-name").value,
          startDate: document.getElementById("act-start").value,
          endDate: document.getElementById("act-end").value,
          description: document.getElementById("act-desc").value,
          linkedMerchantIds: selectedIds(merchantSel),
          linkedExplorationPointIds: selectedIds(pointSel)
        };
      }

      function allDeclared() {
        return Array.prototype.every.call(document.querySelectorAll(".decl-check"), function (c) { return c.checked; });
      }

      var submitBtn = document.getElementById("submit-review-btn");
      function updateSubmitBtn() {
        submitBtn.disabled = !allDeclared();
      }
      document.querySelectorAll(".decl-check").forEach(function (c) {
        c.addEventListener("change", updateSubmitBtn);
      });

      document.getElementById("activity-form").addEventListener("submit", function (e) {
        e.preventDefault();
        var result = adapter.saveParkActivityDraft(buildPayload(), { actorId: ctx.actorId, actorRole: ctx.actorRole });
        savedActivityId = result.activity.id;
        document.getElementById("success-message").textContent = "活动草稿已保存";
        document.getElementById("success-status").textContent = result.activity.statusLabel;
        document.getElementById("success-detail-link").href =
          "../park_admin_activity_detail/index.html?activityId=" + savedActivityId;
        document.getElementById("success-check-link").href =
          "../park_admin_activity_publish_check/index.html?activityId=" + savedActivityId + "&mode=review";
        document.getElementById("form-panel").classList.add("hidden");
        document.getElementById("success-panel").classList.remove("hidden");
        updateSubmitBtn();
      });

      submitBtn.addEventListener("click", function () {
        if (!savedActivityId) {
          var saveResult = adapter.saveParkActivityDraft(buildPayload(), { actorId: ctx.actorId, actorRole: ctx.actorRole });
          savedActivityId = saveResult.activity.id;
        }
        if (!allDeclared()) return;
        var review = adapter.submitParkActivityReview(savedActivityId, { declarationAccepted: true }, {
          actorId: ctx.actorId,
          actorRole: ctx.actorRole
        });
        if (!review.ok) {
          alert(review.message);
          return;
        }
        document.getElementById("success-message").textContent = review.message;
        document.getElementById("success-status").textContent = review.activity.reviewStatusLabel;
        document.getElementById("success-detail-link").href =
          "../park_admin_activity_detail/index.html?activityId=" + savedActivityId;
        document.getElementById("success-check-link").href =
          "../park_admin_activity_publish_check/index.html?activityId=" + savedActivityId + "&mode=review";
        document.getElementById("form-panel").classList.add("hidden");
        document.getElementById("success-panel").classList.remove("hidden");
        submitBtn.textContent = "已提交发布检查";
        submitBtn.disabled = true;
      });
    });
  </script>
</body>
</html>
