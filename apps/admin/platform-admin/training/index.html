<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>培训中心 · AR游伴平台后台</title>
  <link rel="stylesheet" href="../../shared/backoffice.css" />
</head>
<body>
  <div class="bo-app">
    <div id="bo-topnav"></div>
    <div class="bo-body">
      <div id="bo-sidebar"></div>
      <main class="bo-content">
        <div id="bo-breadcrumb"></div>
        <div class="bo-page-header"><h2>培训中心</h2><p>景区、商家、店员培训材料与完成状态</p></div>
        <div class="grid">
          <section class="card span-4">
            <h3 class="card-title">商家培训</h3>
            <p style="margin:0 0 8px;"><strong>商家首日操作</strong></p>
            <p class="text-muted" style="font-size:13px;">扫码授权、工单提交、常见问题</p>
            <p style="margin-top:8px;"><span class="badge badge-warning">待完成</span></p>
          </section>
          <section class="card span-4">
            <h3 class="card-title">园区培训</h3>
            <p style="margin:0 0 8px;"><strong>园区活动配置</strong></p>
            <p class="text-muted" style="font-size:13px;">活动创建、审查检查、发布前确认</p>
            <p style="margin-top:8px;"><span class="badge badge-success">已完成</span></p>
          </section>
          <section class="card span-4">
            <h3 class="card-title">店员培训</h3>
            <p style="margin:0 0 8px;"><strong>店员核销上手</strong></p>
            <p class="text-muted" style="font-size:13px;">扫码核销、状态识别、异常处理</p>
            <p style="margin-top:8px;"><span class="badge badge-warning">待完成</span></p>
          </section>
        </div>
      </main>
    </div>
  </div>
  <script src="../shared/mock-store.js"></script>
  <script src="../../shared/backoffice-shell.js"></script>
  <script src="../shared/page-boot.js"></script>
  <script>
    if (!PlatformAdminMock.requireAuth()) throw new Error("auth");
    PlatformPageBoot.boot("training", [{ label: "平台运营" }, { label: "培训中心" }]);
  </script>
</body>
</html>
