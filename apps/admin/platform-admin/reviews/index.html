<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>审查中心 · AR游伴平台后台</title>
  <link rel="stylesheet" href="../../shared/backoffice.css" />
</head>
<body>
  <div class="bo-app">
    <div id="bo-topnav"></div>
    <div class="bo-body">
      <div id="bo-sidebar"></div>
      <main class="bo-content">
        <div id="bo-breadcrumb"></div>
        <div class="bo-page-header-row">
          <div class="bo-page-header">
            <h2>审查中心</h2>
            <p>活动、商家、卡券、探索点等内容审查队列</p>
          </div>
          <a class="btn btn-primary" href="../publish/index.html">发布中心</a>
        </div>

        <div class="filter-bar" id="review-filters">
          <button class="btn filter-btn active" type="button" data-type="all">全部</button>
          <button class="btn filter-btn" type="button" data-type="activity">活动</button>
          <button class="btn filter-btn" type="button" data-type="exploration_point">探索点</button>
          <button class="btn filter-btn" type="button" data-type="relic">信物</button>
          <button class="btn filter-btn" type="button" data-type="blessing_content">祝福内容</button>
          <button class="btn filter-btn" type="button" data-type="ar_content">AR内容</button>
          <button class="btn filter-btn" type="button" data-type="art_request">美术需求</button>
          <button class="btn filter-btn" type="button" data-type="coupon">卡券</button>
          <button class="btn filter-btn" type="button" data-type="merchant">商家</button>
        </div>

        <div class="bo-review-layout">
          <section class="card">
            <h3 class="card-title">待审查内容</h3>
            <div class="table-wrap">
              <table class="table">
                <thead>
                  <tr>
                    <th>内容名称</th><th>内容类型</th><th>所属景区</th><th>来源模块</th>
                    <th>提交人</th><th>当前状态</th><th>提交时间</th><th>操作</th>
                  </tr>
                </thead>
                <tbody id="review-queue-body"></tbody>
              </table>
            </div>
          </section>
          <section class="card">
            <h3 class="card-title">审查详情</h3>
            <div class="bo-review-panel" id="review-detail-panel">
              <p class="text-muted" style="margin:0;">请选择左侧队列中的审查对象</p>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>
  <script src="../shared/mock-store.js"></script>
  <script src="../../shared/backoffice-shell.js"></script>
  <script src="../shared/platform-adapter-boot.js"></script>
  <script src="../shared/platform-global-search.js"></script>
  <script src="../shared/page-boot.js"></script>
  <script>
    if (!PlatformAdminMock.requireAuth()) throw new Error("auth");
    PlatformPageBoot.boot("reviews", [{ label: "平台运营" }, { label: "审查中心" }]);

    PlatformAdapterBoot.ensureAdapterScripts(function () {
      var adapter = PlatformAdapterBoot.getAdapter();
      var ctx = PlatformAdapterBoot.getPlatformContext();
      var currentFilter = "all";
      var selectedId = new URLSearchParams(location.search).get("reviewId") || "";

      function renderQueue() {
        var queue = adapter.getReviewQueue({ targetType: currentFilter });
        var tbody = document.getElementById("review-queue-body");
        if (!queue.length) {
          tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><h4>暂无审查内容</h4></div></td></tr>';
          return;
        }
        tbody.innerHTML = queue.map(function (r) {
          var canDecide = r.status === "PENDING_REVIEW";
          return "<tr data-review-id=\"" + r.id + "\"><td>" + r.targetName + "</td><td>" + r.targetTypeLabel +
            "</td><td>" + r.parkName + "</td><td>" + (r.sourceModule || "—") + "</td><td>" + r.submittedBy +
            "</td><td>" + PlatformAdapterBoot.statusBadge(r.status, "review") + "</td><td>" +
            PlatformAdapterBoot.formatDateTime(r.createdAt) + '</td><td class="table-actions">' +
            '<button class="btn btn-view" data-id="' + r.id + '">查看详情</button>' +
            (canDecide ? '<button class="btn btn-primary btn-approve" data-id="' + r.id + '">通过</button>' : "") +
            "</td></tr>";
        }).join("");

        tbody.querySelectorAll(".btn-view, tr[data-review-id]").forEach(function (el) {
          el.addEventListener("click", function (e) {
            if (e.target.classList.contains("btn-approve")) return;
            var id = el.getAttribute("data-id") || el.getAttribute("data-review-id");
            showDetail(id);
          });
        });
        tbody.querySelectorAll(".btn-approve").forEach(function (btn) {
          btn.addEventListener("click", function (e) {
            e.stopPropagation();
            decide(btn.getAttribute("data-id"), "APPROVED");
          });
        });

        if (selectedId) {
          showDetail(selectedId);
          selectedId = "";
        }
      }

      function showDetail(reviewId) {
        var detail = adapter.getReviewDetail(reviewId);
        if (!detail) return;
        var panel = document.getElementById("review-detail-panel");
        var canDecide = detail.status === "PENDING_REVIEW";
        panel.innerHTML =
          '<div class="bo-detail-row"><div class="k">内容名称</div><div>' + detail.targetName + "</div></div>" +
          '<div class="bo-detail-row"><div class="k">内容类型</div><div>' + detail.targetTypeLabel + "</div></div>" +
          '<div class="bo-detail-row"><div class="k">所属景区</div><div>' + detail.parkName + "</div></div>" +
          '<div class="bo-detail-row"><div class="k">所属活动</div><div>' + (detail.activityName || "—") + "</div></div>" +
          '<div class="bo-detail-row"><div class="k">来源模块</div><div>' + (detail.sourceModule || "—") + "</div></div>" +
          '<div class="bo-detail-row"><div class="k">提交人</div><div>' + detail.submittedBy + "（" + detail.submittedRole + "）</div></div>" +
          '<div class="bo-detail-row"><div class="k">提交时间</div><div>' + PlatformAdapterBoot.formatDateTime(detail.createdAt) + "</div></div>" +
          '<div class="bo-detail-row"><div class="k">当前状态</div><div>' + PlatformAdapterBoot.statusBadge(detail.status, "review") + "</div></div>" +
          '<div class="bo-review-panel__opinion"><strong>平台审查意见</strong><textarea class="input" id="review-conclusion" rows="2" placeholder="填写审查结论">' +
          (detail.reviewConclusion || "") + "</textarea></div>" +
          '<div class="bo-review-panel__opinion"><strong>阻断原因</strong><textarea class="input" id="review-block" rows="2">' +
          (detail.blockReason || "") + "</textarea></div>" +
          '<div class="bo-review-panel__opinion"><strong>优化建议</strong><textarea class="input" id="review-advice" rows="2">' +
          (detail.optimizationSuggestion || "") + "</textarea></div>" +
          '<div class="bo-review-panel__opinion"><strong>需要补充</strong><textarea class="input" id="review-supplement" rows="2">' +
          (detail.needSupplement || "") + "</textarea></div>" +
          '<div class="bo-review-panel__opinion"><strong>下一步建议</strong><textarea class="input" id="review-next" rows="2">' +
          (detail.nextStepSuggestion || "") + "</textarea></div>" +
          (canDecide
            ? '<div class="toolbar" style="margin-top:14px;flex-wrap:wrap;">' +
              '<button class="btn btn-primary" data-decision="APPROVED">通过</button>' +
              '<button class="btn" data-decision="REJECTED">驳回</button>' +
              '<button class="btn" data-decision="NEED_INFO">要求补充</button>' +
              '<button class="btn" data-decision="BLOCKED">阻断</button></div>'
            : '<div class="bo-park-insight-block" style="margin-top:12px;"><strong>审查结论</strong>' +
              (detail.reviewConclusion || detail.blockReason || detail.optimizationSuggestion || "—") + "</div>");

        panel.querySelectorAll("[data-decision]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            decide(reviewId, btn.getAttribute("data-decision"));
          });
        });
      }

      function decide(reviewId, decision) {
        var payload = {
          decision: decision,
          reviewConclusion: document.getElementById("review-conclusion") && document.getElementById("review-conclusion").value,
          blockReason: document.getElementById("review-block") && document.getElementById("review-block").value,
          optimizationSuggestion: document.getElementById("review-advice") && document.getElementById("review-advice").value,
          needSupplement: document.getElementById("review-supplement") && document.getElementById("review-supplement").value,
          nextStepSuggestion: document.getElementById("review-next") && document.getElementById("review-next").value
        };
        var result = adapter.submitReviewDecision(reviewId, payload, ctx);
        alert(result.message);
        renderQueue();
        showDetail(reviewId);
      }

      document.getElementById("review-filters").addEventListener("click", function (e) {
        var btn = e.target.closest("[data-type]");
        if (!btn) return;
        document.querySelectorAll("#review-filters .filter-btn").forEach(function (b) { b.classList.remove("active"); });
        btn.classList.add("active");
        currentFilter = btn.getAttribute("data-type");
        renderQueue();
      });

      renderQueue();
    });
  </script>
</body>
</html>
