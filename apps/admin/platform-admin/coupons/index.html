<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coupon Center</title>
  <link rel="stylesheet" href="../../shared/components/library.css" />
  <link rel="stylesheet" href="../shared/platform-admin-ui.css" />
</head>
<body>
  <div class="platform-shell">
    <div id="topnav"></div>
    <div class="platform-shell__body">
      <div id="sidenav"></div>
      <main class="platform-shell__main">
        <div class="platform-shell__page">
          <div id="breadcrumbs"></div>
          <div id="header"></div>
          <div id="state-switch"></div>
          <div id="filter"></div>
          <div id="content"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="../shared/mock-store.js"></script>
  <script src="../../shared/components/index.js"></script>
  <script src="../shared/platform-admin-ui.js"></script>
  <script>
    (function () {
      if (!PlatformAdminMock.requireAuth()) return;

      const lib = window.AdminComponentLibrary;
      const ui = window.PlatformAdminUI;
      const pageSize = 2;
      let state = 'loading';
      let query = '';
      let status = 'ALL';
      let page = 1;
      let rows = [];

      const topnav = document.getElementById('topnav');
      const sidenav = document.getElementById('sidenav');
      const breadcrumbs = document.getElementById('breadcrumbs');
      const header = document.getElementById('header');
      const stateSwitch = document.getElementById('state-switch');
      const filter = document.getElementById('filter');
      const content = document.getElementById('content');

      function normalizeRows(source) {
        const rows = (source || []).slice();
        if (rows.length < 4) {
          rows.push(
            { coupon_id: 'coupon_003', coupon_name: '爱企谷手作体验券', merchant_name: '爱企谷手作馆', coupon_type: 'GIFT', stock: 180, claim_count: 90, redeem_count: 46, status: 'APPROVED' },
            { coupon_id: 'coupon_004', coupon_name: '爱企谷民宿折扣券', merchant_name: '爱企谷民宿', coupon_type: 'DISCOUNT', stock: 120, claim_count: 32, redeem_count: 18, status: 'PENDING' },
            { coupon_id: 'coupon_005', coupon_name: '爱企谷花店赠券', merchant_name: '爱企谷花店', coupon_type: 'GIFT', stock: 60, claim_count: 45, redeem_count: 39, status: 'BLOCKED' }
          );
        }
        return rows;
      }

      function renderShell() {
        const shell = ui.shell('coupons', 'Platform Admin', 'Coupon Center');
        topnav.innerHTML = shell.topnav;
        sidenav.innerHTML = shell.sidenav;
        breadcrumbs.innerHTML = ui.breadcrumbs([{ label: 'Platform Admin' }, { label: 'Coupon Center' }]);
        header.innerHTML = ui.pageHeader('Coupon Center', '卡券库存、领取量与核销量统一查看。', [
          { label: '审核中心', href: '../reviews/index.html' },
          { label: '商家管理', href: '../merchants/index.html', variant: 'primary' }
        ]);
        stateSwitch.innerHTML = ui.stateSwitcher(state);
        stateSwitch.querySelectorAll('[data-state]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            state = btn.getAttribute('data-state');
            renderShell();
            renderFilter();
            renderContent();
          });
        });
      }

      function renderFilter() {
        filter.innerHTML = lib.renderFilter({
          controls: [
            { label: '搜索卡券', placeholder: '卡券名称 / 商家', value: query },
            { label: '卡券状态', type: 'select', value: status, options: [
              { value: 'ALL', label: '全部' },
              { value: 'APPROVED', label: 'APPROVED' },
              { value: 'PENDING', label: 'PENDING' },
              { value: 'BLOCKED', label: 'BLOCKED' }
            ] }
          ],
          actions: [
            { label: '重置', variant: 'neutral', type: 'button' },
            { label: '筛选', variant: 'primary', type: 'button' }
          ]
        });
        const inputs = filter.querySelectorAll('.ad-input, .ad-select');
        inputs[0].value = query;
        inputs[1].value = status;
        inputs[0].addEventListener('input', function (e) { query = e.target.value; page = 1; renderContent(); });
        inputs[1].addEventListener('change', function (e) { status = e.target.value; page = 1; renderContent(); });
        filter.querySelectorAll('.ad-btn').forEach(function (btn, index) {
          btn.addEventListener('click', function () {
            if (index === 0) {
              query = '';
              status = 'ALL';
            }
            page = 1;
            renderFilter();
            renderContent();
          });
        });
      }

      function filterRows() {
        return rows.filter(function (item) {
          const text = [item.coupon_name, item.merchant_name].join(' ').toLowerCase();
          const matchedQuery = !query || text.indexOf(query.toLowerCase()) >= 0;
          const matchedStatus = status === 'ALL' || item.status === status;
          return matchedQuery && matchedStatus;
        });
      }

      function renderSuccess() {
        const filtered = filterRows();
        const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
        if (page > totalPages) page = totalPages;
        const slice = filtered.slice((page - 1) * pageSize, (page - 1) * pageSize + pageSize);
        if (!filtered.length) {
          content.innerHTML = ui.stateBlock('empty', { title: '暂无卡券', description: '当前筛选条件下没有结果' });
          return;
        }

        content.innerHTML = [
          '<section class="ad-surface page-card">',
          lib.renderTable({
            columns: [
              { key: 'coupon_name', label: '卡券名称' },
              { key: 'merchant_name', label: '商家' },
              { key: 'stock', label: '库存' },
              { key: 'claim_count', label: '领取量' },
              { key: 'redeem_count', label: '核销量' },
              { key: 'status', label: '状态', render: function (row) { return { html: ui.badge(row.status) }; } }
            ],
            rows: slice
          }),
          '</section>',
          '<div id="pagination"></div>'
        ].join('');

        const pagination = document.getElementById('pagination');
        pagination.innerHTML = lib.renderPagination({ page: page, totalPages: totalPages });
        const buttons = pagination.querySelectorAll('button');
        if (buttons[0]) buttons[0].addEventListener('click', function () { if (page > 1) { page -= 1; renderSuccess(); } });
        if (buttons[1]) buttons[1].addEventListener('click', function () { if (page < totalPages) { page += 1; renderSuccess(); } });
      }

      function renderContent() {
        if (state === 'loading' || state === 'empty' || state === 'error') {
          content.innerHTML = ui.stateBlock(state, {
            title: state === 'loading' ? '卡券中心加载中' : state === 'empty' ? '卡券中心暂无数据' : '卡券中心加载失败',
            description: '支持搜索、筛选和分页。'
          });
          return;
        }
        renderSuccess();
      }

      async function boot() {
        renderShell();
        renderFilter();
        renderContent();
        try {
          rows = normalizeRows(await PlatformAdminMock.loadDataset('platform_coupons'));
          state = 'success';
          renderShell();
          renderFilter();
          renderContent();
        } catch (_err) {
          state = 'error';
          renderShell();
          renderFilter();
          renderContent();
        }
      }

      boot();
    })();
  </script>
</body>
</html>
