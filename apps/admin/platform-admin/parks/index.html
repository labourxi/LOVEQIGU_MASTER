<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>景区管理 · AR游伴平台后台</title>
  <link rel="stylesheet" href="../../shared/backoffice.css" />
</head>
<body>
  <div class="bo-app">
    <div id="bo-topnav"></div>
    <div class="bo-body">
      <div id="bo-sidebar"></div>
      <main class="bo-content">
        <div id="bo-breadcrumb"></div>
        <div class="bo-page-header">
          <h2>景区管理</h2>
          <p>合作景区 / 园区配置 · 商家与活动通过「进入园区视图」代管查看</p>
        </div>
        <section class="card">
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th>景区名称</th><th>地区</th><th>合作状态</th><th>活动</th><th>探索点</th><th>商家</th><th>最近更新</th><th>操作</th></tr></thead>
              <tbody>
                <tr>
                  <td>爱企谷</td><td>华东</td>
                  <td><span class="badge badge-success">合作中</span></td>
                  <td>5</td><td>12</td><td>28</td><td>2026-06-20</td>
                  <td class="table-actions">
                    <a class="btn" href="../merchants/index.html?parkId=park_001">关联商家</a>
                    <a class="btn btn-primary" href="../../park-admin/park_admin_dashboard/index.html?asPlatform=1&parkId=park_001">进入园区视图</a>
                  </td>
                </tr>
                <tr>
                  <td>爱企谷湖畔景区</td><td>华东</td>
                  <td><span class="badge badge-success">合作中</span></td>
                  <td>2</td><td>6</td><td>5</td><td>2026-06-18</td>
                  <td class="table-actions">
                    <a class="btn" href="../activities/index.html#scenic-park_002">查看活动</a>
                    <a class="btn btn-primary" href="../../park-admin/park_admin_dashboard/index.html?asPlatform=1&parkId=park_002">进入园区视图</a>
                  </td>
                </tr>
                <tr>
                  <td>爱企谷森林景区</td><td>华南</td>
                  <td><span class="badge badge-neutral">未启用</span></td>
                  <td>1</td><td>4</td><td>3</td><td>2026-05-10</td>
                  <td class="table-actions">
                    <a class="btn" href="../../park-admin/park_admin_dashboard/index.html?asPlatform=1&parkId=park_003">进入园区视图</a>
                  </td>
                </tr>
                <tr>
                  <td>爱企谷夜游景区</td><td>华北</td>
                  <td><span class="badge badge-warning">待配置</span></td>
                  <td>0</td><td>2</td><td>4</td><td>2026-06-01</td>
                  <td class="table-actions">
                    <a class="btn" href="#">编辑配置</a>
                    <a class="btn" href="../../park-admin/park_admin_dashboard/index.html?asPlatform=1&parkId=park_004">进入园区视图</a>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
        <div class="bo-park-insight-block" style="margin-top:16px;">
          <strong>治理说明</strong>
          商家资料归属景区管理。请通过「进入园区视图」查看该景区下的商家数据、活动数据与工单，无需重复建设景区详情页。
        </div>
      </main>
    </div>
  </div>
  <script src="../shared/mock-store.js"></script>
  <script src="../../shared/backoffice-shell.js"></script>
  <script src="../shared/platform-global-search.js"></script>
  <script src="../shared/platform-park-view.js"></script>
  <script src="../shared/page-boot.js"></script>
  <script>
    if (!PlatformAdminMock.requireAuth()) throw new Error("auth");
    PlatformPageBoot.boot("parks", [{ label: "平台运营" }, { label: "景区管理" }]);
  </script>
</body>
</html>
