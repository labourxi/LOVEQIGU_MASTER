<!doctype html>
<html lang="zh-CN">
<head>

<body>

                  <td>张三 · 138****0000</td>
                  <td class="table-actions">
                    <a class="btn btn-primary" href="../../park-admin/park_admin_merchants/index.html?asPlatform=1&parkId=park_001">进入园区视图</a>
                  </td>
                </tr>
                <tr>
                  <td>探索书屋</td><td>爱企谷</td><td>书店文创</td><td>1</td><td>1</td><td>12</td>
                  <td><span class="badge badge-warning">需关注</span></td>
                  <td>李四 · 138****0001</td>
                  <td class="table-actions">
                    <a class="btn btn-primary" href="../../park-admin/park_admin_merchants/index.html?asPlatform=1&parkId=park_001">进入园区视图</a>

                <tr>
                  <td>爱企谷民宿</td><td>爱企谷湖畔</td><td>住宿</td><td>1</td><td>2</td><td>18</td>

                  <td>周店长 · 138****0004</td>
                  <td class="table-actions">

                    <a class="btn" href="../../park-admin/park_admin_dashboard/index.html?asPlatform=1&parkId=park_002">进入园区视图</a>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="../shared/mock-store.js"></script>
