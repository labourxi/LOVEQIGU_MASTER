<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>发布中心 · AR游伴平台后台</title>
  <link rel="stylesheet" href="../../shared/backoffice.css" />
</head>
<body>
  <div class="bo-app">
    <div id="bo-topnav"></div>
    <div class="bo-body">
      <div id="bo-sidebar"></div>
      <main class="bo-content">
        <div id="bo-breadcrumb"></div>
        <div class="bo-page-header-row">
          <div class="bo-page-header">
            <h2>发布中心</h2>
            <p>待发布内容 · Runtime 状态 · 发布风险管控</p>
          </div>
          <a class="btn" href="../reviews/index.html">审查中心</a>
        </div>

        <div class="bo-risk-notice">
          <strong>Mock Runtime 提示</strong>
          当前为 Mock Runtime 发布占位，用于验证发布流程，不代表内容已真实上线。
        </div>

        <div id="publish-banner" class="alert alert-success hidden"></div>

        <section class="card">
          <h3 class="card-title">待发布队列</h3>
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>内容</th><th>类型</th><th>发布目标</th><th>关联景区</th>
                  <th>审查状态</th><th>发布检查</th><th>Runtime</th><th>风险</th><th>操作</th>
                </tr>
              </thead>
              <tbody id="publish-body"></tbody>
            </table>
          </div>
        </section>

        <section class="card hidden" id="publish-detail-card" style="margin-top:16px;">
          <h3 class="card-title">发布详情</h3>
          <div class="bo-publish-panel" id="publish-detail-body"></div>
          <h4 class="card-title" style="margin-top:16px;border:0;padding-top:0;">发布日志</h4>
          <div id="publish-log-panel"></div>
        </section>
      </main>
    </div>
  </div>
  <script src="../shared/mock-store.js"></script>
  <script src="../../shared/backoffice-shell.js"></script>
  <script src="../shared/platform-adapter-boot.js"></script>
  <script src="../shared/platform-global-search.js"></script>
  <script src="../shared/page-boot.js"></script>
  <script>
    if (!PlatformAdminMock.requireAuth()) throw new Error("auth");
    PlatformPageBoot.boot("publish", [{ label: "平台运营" }, { label: "发布中心" }]);

    PlatformAdapterBoot.ensureAdapterScripts(function () {
      var adapter = PlatformAdapterBoot.getAdapter();
      var ctx = PlatformAdapterBoot.getPlatformContext();
      var highlightId = new URLSearchParams(location.search).get("publishId") || "";

      function renderTable() {
        var queue = adapter.getPublishQueue();
        var body = document.getElementById("publish-body");
        if (!queue.length) {
          body.innerHTML = '<tr><td colspan="9"><div class="empty-state"><h4>暂无待发布内容</h4></div></td></tr>';
          return;
        }
        body.innerHTML = queue.map(function (p) {
          return "<tr><td>" + p.targetName + "</td><td>" + p.targetTypeLabel +
            "</td><td>Runtime 占位</td><td>" + p.parkName + "</td><td>" +
            PlatformAdapterBoot.statusBadge(p.reviewStatus, "review") + "</td><td>" +
            PlatformAdapterBoot.statusBadge(p.publishCheckStatus, "publish") + "</td><td>" +
            PlatformAdapterBoot.statusBadge(p.runtimeStatus, "runtime") + "</td><td>" +
            PlatformAdapterBoot.statusBadge(p.riskStatus, "risk") + '</td><td class="table-actions">' +
            '<button class="btn" data-detail="' + p.id + '">详情</button>' +
            '<button class="btn btn-primary btn-publish" data-publish="' + p.id + '" ' +
            (p.canPublish ? "" : "disabled") + ">发布</button>" +
            '<button class="btn" data-log="' + p.id + '">日志</button>' +
            '<button class="btn" disabled title="Mock 占位">回滚</button></td></tr>';
        }).join("");

        body.querySelectorAll("[data-detail]").forEach(function (b) {
          b.onclick = function () { showDetail(b.getAttribute("data-detail")); };
        });
        body.querySelectorAll("[data-log]").forEach(function (b) {
          b.onclick = function () { showDetail(b.getAttribute("data-log")); };
        });
        body.querySelectorAll(".btn-publish").forEach(function (b) {
          b.onclick = function () { publishItem(b.getAttribute("data-publish")); };
        });

        if (highlightId) {
          showDetail(highlightId);
          highlightId = "";
        }
      }

      function showDetail(id) {
        var detail = adapter.getPublishDetail(id);
        if (!detail) return;
        document.getElementById("publish-detail-body").innerHTML =
          '<div class="bo-detail-row"><div class="k">内容名称</div><div>' + detail.targetName + "</div></div>" +
          '<div class="bo-detail-row"><div class="k">内容类型</div><div>' + detail.targetTypeLabel + "</div></div>" +
          '<div class="bo-detail-row"><div class="k">景区</div><div>' + detail.parkName + "</div></div>" +
          '<div class="bo-detail-row"><div class="k">审查状态</div><div>' + PlatformAdapterBoot.statusBadge(detail.reviewStatus, "review") + "</div></div>" +
          '<div class="bo-detail-row"><div class="k">发布检查</div><div>' + PlatformAdapterBoot.statusBadge(detail.publishCheckStatus, "publish") + "</div></div>" +
          '<div class="bo-detail-row"><div class="k">Runtime 状态</div><div>' + PlatformAdapterBoot.statusBadge(detail.runtimeStatus, "runtime") + "</div></div>" +
          '<div class="bo-detail-row"><div class="k">发布单号</div><div>' + detail.id + "</div></div>" +
          '<div class="bo-detail-row"><div class="k">最近更新</div><div>' + PlatformAdapterBoot.formatDateTime(detail.updatedAt) + "</div></div>";
        PlatformAdapterBoot.renderPublishLogs(document.getElementById("publish-log-panel"), detail.logs);
        document.getElementById("publish-detail-card").classList.remove("hidden");
      }

      function publishItem(id) {
        if (!confirm("确认发布？此操作为 Mock Runtime 占位，不代表真实上线。")) return;
        var result = adapter.publishTarget(id, ctx);
        var banner = document.getElementById("publish-banner");
        banner.textContent = result.message;
        banner.className = "alert " + (result.ok ? "alert-success" : "alert-danger");
        banner.classList.remove("hidden");
        renderTable();
        showDetail(id);
      }

      renderTable();
    });
  </script>
</body>
</html>
