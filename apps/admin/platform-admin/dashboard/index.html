<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>平台总览 · AR游伴平台后台</title>
  <link rel="stylesheet" href="../../shared/backoffice.css" />
</head>
<body>
  <div class="bo-app">
    <div id="bo-topnav"></div>
    <div class="bo-body">
      <div id="bo-sidebar"></div>
      <main class="bo-content">
        <div id="bo-breadcrumb"></div>
        <div class="bo-page-header-row">
          <div class="bo-page-header">
            <h2>平台总览</h2>
            <p>本周运营摘要 · 审查 / 发布 / 工单闭环</p>
          </div>
          <div class="toolbar">
            <a class="btn btn-primary" href="../reviews/index.html">审查中心</a>
            <a class="btn btn-primary" href="../publish/index.html">发布中心</a>
            <a class="btn" href="../parks/index.html">景区管理</a>
            <a class="btn" href="../coupons/index.html">卡券分析</a>
            <a class="btn" href="../tickets/index.html">工单处理</a>
          </div>
        </div>

        <div class="bo-platform-summary">
          <div class="bo-platform-summary__title">本周运营摘要</div>
          <div class="bo-platform-summary__copy" id="platform-summary-copy">加载中…</div>
        </div>

        <div class="bo-platform-kpi-grid" id="platform-kpi-grid">
          <div class="bo-metric-card"><div class="bo-metric-card__label">景区</div><div class="bo-metric-card__value" id="kpi-parks">—</div></div>
          <div class="bo-metric-card"><div class="bo-metric-card__label">商家</div><div class="bo-metric-card__value" id="kpi-merchants">—</div></div>
          <div class="bo-metric-card"><div class="bo-metric-card__label">活动</div><div class="bo-metric-card__value" id="kpi-activities">—</div></div>
          <div class="bo-metric-card"><div class="bo-metric-card__label">卡券</div><div class="bo-metric-card__value" id="kpi-coupons">—</div></div>
          <div class="bo-metric-card"><div class="bo-metric-card__label">用户参与</div><div class="bo-metric-card__value" id="kpi-participants">—</div></div>
          <div class="bo-metric-card bo-metric-card--highlight"><div class="bo-metric-card__label">待审查</div><div class="bo-metric-card__value" id="kpi-pending-review">—</div></div>
          <div class="bo-metric-card bo-metric-card--highlight"><div class="bo-metric-card__label">待发布</div><div class="bo-metric-card__value" id="kpi-pending-publish">—</div></div>
          <div class="bo-metric-card bo-metric-card--risk"><div class="bo-metric-card__label">待处理工单</div><div class="bo-metric-card__value" id="kpi-tickets">—</div></div>
        </div>

        <div class="grid">
          <section class="card span-6">
            <h3 class="card-title">待处理事项</h3>
            <div class="bo-review-queue" id="pending-items"></div>
          </section>
          <section class="card span-6">
            <h3 class="card-title">发布队列摘要</h3>
            <div class="bo-publish-queue" id="publish-summary"></div>
          </section>
          <section class="card span-12">
            <h3 class="card-title">风险与异常提醒</h3>
            <div id="risk-notices"></div>
          </section>
          <section class="card span-12" id="content-production">
            <h3 class="card-title">内容生产 · AR 生产线</h3>
            <p class="text-muted" style="margin:0 0 12px;font-size:13px;">探索点 / 信物 / 祝福 / AR / 美术资源生产与审查发布闭环。</p>
            <div class="bo-quick-actions">
              <a class="btn btn-primary" href="../platform_content_dashboard/index.html">生产总览</a>
              <a class="btn" href="../platform_exploration_points/index.html">探索点管理</a>
              <a class="btn" href="../platform_relics/index.html">信物管理</a>
              <a class="btn" href="../platform_blessing_content/index.html">祝福内容</a>
              <a class="btn" href="../platform_ar_content/index.html">AR 内容</a>
              <a class="btn" href="../platform_art_requests/index.html">美术需求单</a>
              <a class="btn" href="../platform_generation_tasks/index.html">生成任务</a>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>
  <script src="../shared/mock-store.js"></script>
  <script src="../../shared/backoffice-shell.js"></script>
  <script src="../shared/platform-adapter-boot.js"></script>
  <script src="../shared/platform-global-search.js"></script>
  <script src="../shared/page-boot.js"></script>
  <script>
    if (!PlatformAdminMock.requireAuth()) throw new Error("auth");
    PlatformPageBoot.boot("dashboard", [{ label: "平台运营" }, { label: "平台总览" }]);

    PlatformAdapterBoot.ensureAdapterScripts(function () {
      var dash = PlatformAdapterBoot.getAdapter().getPlatformDashboard();
      document.getElementById("platform-summary-copy").textContent =
        "合作景区 " + dash.parkCount + " 个 · 入驻商家 " + dash.merchantCount +
        " 家 · 活动 " + dash.activityCount + " 个 · 待审查 " + dash.pendingReview +
        " 条 · 待发布 " + dash.pendingPublish + " 条 · 已阻断 " + dash.blockedCount +
        " 条 · 待处理工单 " + dash.pendingTickets + " 条";
      document.getElementById("kpi-parks").textContent = dash.parkCount;
      document.getElementById("kpi-merchants").textContent = dash.merchantCount;
      document.getElementById("kpi-activities").textContent = dash.activityCount;
      document.getElementById("kpi-coupons").textContent = dash.couponCount;
      document.getElementById("kpi-participants").textContent = dash.participantCount.toLocaleString();
      document.getElementById("kpi-pending-review").textContent = dash.pendingReview;
      document.getElementById("kpi-pending-publish").textContent = dash.pendingPublish;
      document.getElementById("kpi-tickets").textContent = dash.pendingTickets;

      document.getElementById("pending-items").innerHTML = dash.pendingItems.map(function (item) {
        return '<div class="bo-review-queue__item"><div><strong>' + item.title +
          '</strong><br /><span class="text-muted" style="font-size:12px;">' + item.meta +
          '</span></div><a class="btn btn-primary" href="' + item.href + '">处理</a></div>';
      }).join("") || '<p class="text-muted">暂无待处理事项</p>';

      document.getElementById("publish-summary").innerHTML = dash.publishQueueSummary.map(function (p) {
        return '<div class="bo-publish-queue__item"><div><strong>' + p.targetName +
          '</strong><br />' + PlatformAdapterBoot.statusBadge(p.publishCheckStatus, "publish") +
          '</div><a class="btn" href="../publish/index.html?publishId=' + p.id + '">查看</a></div>';
      }).join("") || '<p class="text-muted">暂无发布队列</p>';

      document.getElementById("risk-notices").innerHTML = dash.risks.map(function (r) {
        return '<div class="bo-risk-notice"><strong>风险提醒</strong> ' + r + "</div>";
      }).join("");
    });
  </script>
</body>
</html>
