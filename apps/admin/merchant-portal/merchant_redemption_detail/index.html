<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>核销详情 · AR游伴商家工作台</title>
  <link rel="stylesheet" href="../../shared/backoffice.css" />
</head>
<body>
  <div class="bo-app">
    <div id="bo-topnav"></div>
    <div class="bo-body">
      <div id="bo-sidebar"></div>
      <main class="bo-content">
        <div id="bo-breadcrumb"></div>
        <div class="bo-page-header-row">
          <div class="bo-page-header">
            <h2 id="detail-title">核销详情</h2>
            <p>查看单条探索礼遇到店核销记录</p>
          </div>
          <a class="btn" href="../merchant_redemptions/index.html">返回列表</a>
        </div>
        <div id="success-banner" class="alert alert-success hidden"></div>
        <section class="card" id="detail-card">
          <div id="detail-body"></div>
          <div class="toolbar" id="detail-actions" style="margin-top:16px;"></div>
        </section>
        <section class="card hidden" id="detail-empty">
          <div class="empty-state"><h4>未找到核销记录</h4><p>请从核销记录列表选择有效记录</p></div>
        </section>
      </main>
    </div>
  </div>
  <script src="../../shared/backoffice-shell.js"></script>
  <script src="../shared/merchant-adapter-boot.js"></script>
  <script src="../shared/status-labels.js"></script>
  <script src="../shared/page-boot.js"></script>
  <script>
    MerchantPageBoot.boot("redemptions", [{ label: "商家工作台" }, { label: "核销记录", href: "../merchant_redemptions/index.html" }, { label: "核销详情" }]);

    function getQueryId() {
      return new URLSearchParams(window.location.search).get("id") || "claim_001";
    }

    function renderDetail(row, adapter, ctx) {
      if (!row) {
        document.getElementById("detail-card").classList.add("hidden");
        document.getElementById("detail-empty").classList.remove("hidden");
        return;
      }
      document.getElementById("detail-title").textContent = row.couponName + " · " + row.claimCode;
      var fields = [
        ["核销码", row.claimCode],
        ["卡券名称", row.couponName],
        ["所属商家", row.merchant_name],
        ["所属活动", row.activityName],
        ["用户", row.userMask],
        ["当前状态", MerchantAdapterBoot.redemptionStatusBadge(row.status)],
        ["领取时间", row.claimedAt],
        ["核销时间", row.redeemedAt || "—"],
        ["核销员", row.operator || "—"],
        ["核销结果", row.resultLabel || "—"],
        ["异常说明", row.exceptionNote || "—"]
      ];
      document.getElementById("detail-body").innerHTML = fields.map(function (pair) {
        return '<div class="bo-detail-row"><div class="k">' + pair[0] + '</div><div>' + pair[1] + "</div></div>";
      }).join("");
      var actions = document.getElementById("detail-actions");
      if (row.status === "PENDING") {
        actions.innerHTML = '<button class="btn btn-success" id="verify-btn" type="button">确认核销</button><a class="btn btn-primary" href="../merchant_scan/index.html">前往扫码核销</a>';
        document.getElementById("verify-btn").addEventListener("click", function () {
          var res = adapter.verifyCouponClaim(row.claimCode, ctx.merchantId, ctx.staffId);
          if (res.ok) {
            document.getElementById("success-banner").textContent = "核销成功 · " + res.redeemedAt;
            document.getElementById("success-banner").classList.remove("hidden");
            renderDetail(adapter.getMerchantRedemptionDetail(row.claimId), adapter, ctx);
          }
        });
      } else {
        actions.innerHTML = '<span class="text-muted">当前状态不可再次核销</span>';
      }
    }

    MerchantAdapterBoot.ensureAdapterScripts(function () {
      var adapter = MerchantAdapterBoot.getAdapter();
      var ctx = MerchantAdapterBoot.getMerchantContext();
      renderDetail(adapter.getMerchantRedemptionDetail(getQueryId()), adapter, ctx);
    });
  </script>
</body>
</html>
