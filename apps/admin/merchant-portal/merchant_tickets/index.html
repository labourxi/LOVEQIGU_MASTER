<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>工单 · AR游伴商家工作台</title>
  <link rel="stylesheet" href="../../shared/backoffice.css" />
</head>
<body>
  <div class="bo-app">
    <div id="bo-topnav"></div>
    <div class="bo-body">
      <div id="bo-sidebar"></div>
      <main class="bo-content">
        <div id="bo-breadcrumb"></div>
        <div class="bo-page-header-row">
          <div class="bo-page-header"><h2>工单</h2><p>遇到礼遇核销、账单或活动协作问题，可提交工单联系平台</p></div>
          <a class="btn btn-primary" href="../merchant_ticket_new/index.html">提交新工单</a>
        </div>

        <section class="card">
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th>标题</th><th>类型</th><th>状态</th><th>提交时间</th><th>平台回复</th><th>操作</th></tr></thead>
              <tbody>
                <tr>
                  <td>礼遇领取数异常</td>
                  <td><span class="badge badge-accent">礼遇问题</span></td>
                  <td><span class="badge badge-warning">待处理</span></td>
                  <td>2026-06-15 09:30</td>
                  <td><span class="badge badge-accent">已回复</span></td>
                  <td><a class="btn" href="../merchant_ticket_detail/index.html">查看详情</a></td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <div class="bo-help-block" style="margin-top:16px;">
          <h4>需要帮助？</h4>
          <p>可先查看<a href="../merchant_help/index.html">帮助中心</a>常见问题，或直接提交工单联系平台。</p>
        </div>
      </main>
    </div>
  </div>
  <script src="../../shared/backoffice-shell.js"></script>
  <script src="../shared/status-labels.js"></script>
  <script src="../shared/page-boot.js"></script>
  <script>MerchantPageBoot.boot("tickets", [{ label: "商家工作台" }, { label: "工单" }]);</script>
</body>
</html>
