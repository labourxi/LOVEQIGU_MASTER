<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>商家后台 Phase1 · AR游伴</title>
  <link rel="stylesheet" href="../shared/components/library.css" />
  <link rel="stylesheet" href="../shared/backoffice.css" />
  <link rel="stylesheet" href="../shared/admin-frontphase1.css" />
</head>
<body>
  <div class="bo-app">
    <div id="bo-topnav"></div>
    <div class="bo-body">
      <div id="bo-sidebar"></div>
      <main class="bo-content">
        <div class="phase1-home">
          <div id="bo-breadcrumb"></div>
          <section class="phase1-hero">
            <div class="phase1-panel">
              <h1 class="phase1-title">Merchant Portal Phase1</h1>
              <p class="phase1-subtitle">商家后台只聚焦三件事：看主页、看卡券、看核销。第一版不接数据库、不接支付、不做复杂财务，只保留商家能快速上手的轻量工作台。</p>
              <div class="phase1-badge-row">
                <span class="badge badge-danger">Blessing Red</span>
                <span class="badge badge-gold">Blessing Gold</span>
                <span class="badge badge-neutral">Ink Black</span>
                <span class="badge badge-info">Rice White</span>
              </div>
              <div id="role-switch" class="phase1-role-switch"></div>
              <div class="phase1-badge-row">
                <a class="btn btn-primary" href="./merchant_dashboard/index.html">Home</a>
                <a class="btn" href="./merchant_coupons/index.html">Coupon Center</a>
                <a class="btn" href="./merchant_redemptions/index.html">Verification Center</a>
              </div>
            </div>
            <aside class="phase1-panel">
              <h3 class="phase1-title" style="font-size:18px;">商家核心动作</h3>
              <div id="state-switch" class="phase1-state-switch"></div>
              <div class="phase1-info-list" style="margin-top:12px;">
                <div class="phase1-info-item"><span class="label">主入口</span><span class="value">Home</span></div>
                <div class="phase1-info-item"><span class="label">核心模块</span><span class="value">Coupon / Verification</span></div>
                <div class="phase1-info-item"><span class="label">运行模式</span><span class="value">Mock Data Only</span></div>
              </div>
            </aside>
          </section>

          <section class="phase1-metric-grid" id="kpi-grid"></section>
          <section class="phase1-module-grid" id="module-grid"></section>

          <section class="phase1-panel">
            <div class="bo-page-header" style="margin-bottom:16px;">
              <h2 style="margin:0 0 6px;">卡券与核销概览</h2>
              <p style="margin:0;color:var(--text-secondary);">基于 merchant mock data，展示卡券与核销最新状态。</p>
            </div>
            <div id="detail-list"></div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script src="../shared/components/index.js"></script>
  <script src="../shared/backoffice-shell.js"></script>
  <script src="../shared/admin-frontphase1.js"></script>
  <script>
    (function () {
      var lib = window.AdminComponentLibrary;
      var shell = window.BackofficeShell;
      var phase1 = window.AdminFrontPhase1;
      var state = "loading";
      var merchant = {};
      var coupons = [];
      var redemptions = [];
      var bills = [];
      var tickets = [];
      var kpiGrid = document.getElementById("kpi-grid");
      var moduleGrid = document.getElementById("module-grid");
      var detailList = document.getElementById("detail-list");
      var stateSwitch = document.getElementById("state-switch");
      var roleSwitch = document.getElementById("role-switch");

      function renderShell() {
        shell.mount({
          portal: "merchant",
          active: "dashboard",
          breadcrumbs: [{ label: "商家后台" }, { label: "Phase1 首页" }]
        });
        phase1.mountRoleSwitcher(roleSwitch, function (role) {
          var map = {
            platform: "../platform-admin/index.html",
            merchant: "../merchant-portal/index.html",
            park: "../park-admin/index.html"
          };
          location.href = map[role];
        });
        phase1.mountStateButtons(stateSwitch, state, function (next) {
          state = next;
          renderContent();
        });
      }

      function card(item) {
        return (
          '<article class="phase1-panel phase1-module-card">' +
          '<h3 class="phase1-module-card__title">' + item.title + '</h3>' +
          '<p class="phase1-module-card__desc">' + item.desc + '</p>' +
          '<a class="btn btn-primary" href="' + item.href + '">进入</a>' +
          '</article>'
        );
      }

      function renderLoadingLike(kind) {
        if (kind === "loading") return lib.renderLoadingState({ title: "商家后台加载中", description: "正在读取商家 mock 数据" });
        if (kind === "empty") return lib.renderEmptyState({ title: "暂无数据", description: "切换到 success 查看完整内容" });
        if (kind === "error") return lib.renderErrorState({ title: "加载失败", description: "mock 数据读取失败" });
        return "";
      }

      function renderContent() {
        if (state !== "success") {
          kpiGrid.innerHTML = renderLoadingLike(state);
          moduleGrid.innerHTML = "";
          detailList.innerHTML = "";
          return;
        }

        var profile = merchant;
        var activeCoupons = coupons.filter(function (item) { return item.status_label === "PUBLISHED" || item.status === "ACTIVE"; });
        var totalClaimed = coupons.reduce(function (sum, item) { return sum + (item.claimed_count || 0); }, 0);
        var totalRedeemed = coupons.reduce(function (sum, item) { return sum + (item.redeemed_count || 0); }, 0);
        var kpis = [
          { label: "今日到店人数", value: redemptions.length * 4 + 12, subtext: profile.merchant_name || "Merchant Home" },
          { label: "今日核销人数", value: redemptions.filter(function (item) { return item.status === "VERIFIED"; }).length, subtext: "Verification Center" },
          { label: "预计收益", value: "¥" + (bills.length * 1200 + 2880), subtext: "Mock estimate" },
          { label: "结算状态", value: bills[0] ? bills[0].status : "PENDING_PAYMENT", valueTone: "warning", subtext: "Finance" },
          { label: "卡券领取", value: totalClaimed, subtext: "Coupon Center" },
          { label: "卡券核销", value: totalRedeemed, subtext: "Verification Center" }
        ];

        kpiGrid.innerHTML = kpis.map(function (item) { return lib.renderKpiCard(item); }).join("");
        moduleGrid.innerHTML = phase1.portalCards("merchant").map(card).join("");
        detailList.innerHTML = lib.renderTable({
          stickyHeader: true,
          columns: [
            { key: "coupon_name", label: "卡券" },
            { key: "status_label", label: "状态", render: function (row) { return { html: shell.statusBadge(row.status_label || row.status) }; } },
            { key: "activity_name", label: "所属活动" },
            { key: "valid_to", label: "有效期" }
          ],
          rows: activeCoupons.slice(0, 4)
        });
      }

      async function boot() {
        renderShell();
        renderContent();
        try {
          var results = await Promise.all([
            phase1.loadJson("../../../data/merchant_portal/merchant_profile.mock.json"),
            phase1.loadJson("../../../data/merchant_portal/merchant_coupon.mock.json"),
            phase1.loadJson("../../../data/merchant_portal/coupon_redemption_record.mock.json"),
            phase1.loadJson("../../../data/merchant_portal/merchant_bill.mock.json"),
            phase1.loadJson("../../../data/merchant_portal/merchant_ticket.mock.json")
          ]);
          merchant = results[0];
          coupons = Array.isArray(results[1]) ? results[1] : [results[1]];
          redemptions = Array.isArray(results[2]) ? results[2] : [results[2]];
          bills = Array.isArray(results[3]) ? results[3] : [results[3]];
          tickets = Array.isArray(results[4]) ? results[4] : [results[4]];
          state = "success";
        } catch (_err) {
          state = "error";
        }
        renderShell();
        renderContent();
      }

      boot();
    })();
  </script>
</body>
</html>
