<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>提交工单 · AR游伴商家工作台</title>
  <link rel="stylesheet" href="../../shared/backoffice.css" />
</head>
<body>
  <div class="bo-app">
    <div id="bo-topnav"></div>
    <div class="bo-body">
      <div id="bo-sidebar"></div>
      <main class="bo-content">
        <div id="bo-breadcrumb"></div>
        <div class="bo-page-header"><h2>提交工单</h2><p>描述您遇到的问题，平台客服将尽快处理</p></div>

        <section class="card" id="form-panel" style="max-width:640px;">
          <form id="ticket-form">
            <div class="form-group">
              <label for="ticket-type">问题类型</label>
              <select class="input" id="ticket-type">
                <option value="COUPON_ISSUE">卡券问题</option>
                <option value="REDEMPTION_ISSUE">核销问题</option>
                <option value="FINANCE_ISSUE">账单问题</option>
                <option value="OTHER">其他</option>
              </select>
            </div>
            <div class="form-group">
              <label for="ticket-title">问题标题</label>
              <input class="input" id="ticket-title" type="text" placeholder="简要描述问题" value="卡券领取数异常" />
            </div>
            <div class="form-group">
              <label for="ticket-desc">问题描述</label>
              <textarea class="input" id="ticket-desc" rows="4" placeholder="请详细描述问题情况">今日卡券领取数与后台显示不一致，请协助核查。</textarea>
            </div>
            <div class="form-group">
              <label for="ticket-contact">联系方式</label>
              <input class="input" id="ticket-contact" type="text" placeholder="手机号或微信" value="13800000000" />
            </div>
            <div class="form-group">
              <label>附件（占位）</label>
              <p class="text-muted" style="margin:0;font-size:13px;">可上传截图辅助说明，当前为 Mock 占位。</p>
            </div>
            <button class="btn btn-primary btn-lg" type="submit">提交工单</button>
          </form>
        </section>

        <section class="card hidden" id="success-panel" style="max-width:640px;">
          <div class="alert alert-success">工单已提交，编号 ticket_002</div>
          <p>状态：<span class="badge badge-warning">待处理</span></p>
          <div class="toolbar">
            <a class="btn btn-primary" href="../merchant_ticket_detail/index.html">查看工单详情</a>
            <a class="btn" href="../merchant_tickets/index.html">返回工单列表</a>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="../../shared/backoffice-shell.js"></script>
  <script src="../shared/status-labels.js"></script>
  <script src="../shared/page-boot.js"></script>
  <script>
    MerchantPageBoot.boot("tickets", [{ label: "商家工作台" }, { label: "工单", href: "../merchant_tickets/index.html" }, { label: "提交工单" }]);
    document.getElementById("ticket-form").addEventListener("submit", function (e) {
      e.preventDefault();
      document.getElementById("form-panel").classList.add("hidden");
      document.getElementById("success-panel").classList.remove("hidden");
    });
  </script>
</body>
</html>
