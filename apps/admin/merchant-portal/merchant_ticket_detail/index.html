<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>工单详情 · AR游伴商家工作台</title>
  <link rel="stylesheet" href="../../shared/backoffice.css" />
</head>
<body>
  <div class="bo-app">
    <div id="bo-topnav"></div>
    <div class="bo-body">
      <div id="bo-sidebar"></div>
      <main class="bo-content">
        <div id="bo-breadcrumb"></div>
        <div class="bo-page-header-row">
          <div class="bo-page-header">
            <h2>卡券领取数异常</h2>
            <p>工单编号 ticket_001 · 提交于 2026-06-15 09:30</p>
          </div>
          <span class="badge badge-warning">待处理</span>
        </div>

        <div class="grid">
          <section class="card span-6">
            <h3 class="card-title">问题描述</h3>
            <p style="line-height:1.7;margin:0;">今日卡券领取数与后台显示不一致，请协助核查数据同步情况。</p>
            <div style="margin-top:16px;">
              <div class="bo-detail-row"><div class="k">问题类型</div><div><span class="badge badge-accent">卡券问题</span></div></div>
              <div class="bo-detail-row"><div class="k">联系方式</div><div>13800000000</div></div>
              <div class="bo-detail-row"><div class="k">关联活动</div><div>爱企谷首场探索活动</div></div>
              <div class="bo-detail-row"><div class="k">关联卡券</div><div>爱企谷初见到店礼</div></div>
            </div>
          </section>
          <section class="card span-6">
            <h3 class="card-title">下一步提示</h3>
            <div class="bo-help-block">
              <p style="margin:0;line-height:1.7;">平台已收到您的工单，预计 1 个工作日内回复。您可在此页面查看回复记录，如有补充信息可继续留言。</p>
            </div>
          </section>
          <section class="card span-12">
            <h3 class="card-title">回复记录</h3>
            <div class="bo-list-card">
              <div class="bo-list-card__head">
                <span class="bo-list-card__title">平台客服</span>
                <span class="text-muted">2026-06-15 10:00</span>
              </div>
              <div class="bo-list-card__meta">已收到反馈，正在核查卡券领取数据，请稍候。</div>
            </div>
          </section>
        </div>

        <div class="toolbar" style="margin-top:16px;">
          <a class="btn" href="../merchant_tickets/index.html">返回工单列表</a>
          <a class="btn btn-primary" href="../merchant_ticket_new/index.html">提交新工单</a>
        </div>
      </main>
    </div>
  </div>
  <script src="../../shared/backoffice-shell.js"></script>
  <script src="../shared/status-labels.js"></script>
  <script src="../shared/page-boot.js"></script>
  <script>MerchantPageBoot.boot("tickets", [{ label: "商家工作台" }, { label: "工单", href: "../merchant_tickets/index.html" }, { label: "工单详情" }]);</script>
</body>
</html>
