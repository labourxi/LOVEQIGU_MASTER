<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>卡券详情 · AR游伴商家工作台</title>
  <link rel="stylesheet" href="../../shared/backoffice.css" />
</head>
<body>
  <div class="bo-app">
    <div id="bo-topnav"></div>
    <div class="bo-body">
      <div id="bo-sidebar"></div>
      <main class="bo-content">
        <div id="bo-breadcrumb"></div>
        <div class="bo-page-header-row">
          <div class="bo-page-header">
            <h2 id="coupon-title">卡券详情</h2>
            <p id="coupon-subtitle">—</p>
          </div>
          <span class="badge badge-success" id="coupon-status-badge">—</span>
        </div>
        <div class="bo-metric-grid" id="coupon-metrics"></div>
        <div class="grid">
          <section class="card span-6">
            <h3 class="card-title">基础信息</h3>
            <div id="coupon-info"></div>
          </section>
          <section class="card span-6 bo-merchant-accent-line">
            <h3 class="card-title">使用规则</h3>
            <p class="text-muted" id="coupon-desc" style="line-height:1.7;margin:0;">—</p>
            <p class="text-muted" id="coupon-risk" style="margin-top:12px;">—</p>
          </section>
          <section class="card span-12">
            <h3 class="card-title">最近礼遇核销记录</h3>
            <div class="table-wrap">
              <table class="table">
                <thead><tr><th>礼遇码</th><th>用户</th><th>核销时间</th><th>状态</th></tr></thead>
                <tbody id="recent-body"></tbody>
              </table>
            </div>
            <p style="margin-top:12px;"><a href="../merchant_redemptions/index.html">查看全部礼遇核销记录 →</a></p>
          </section>
        </div>
        <div class="toolbar" style="margin-top:16px;">
          <a class="btn" href="../merchant_coupons/index.html">返回礼遇列表</a>
        </div>
      </main>
    </div>
  </div>
  <script src="../../shared/backoffice-shell.js"></script>
  <script src="../shared/merchant-adapter-boot.js"></script>
  <script src="../shared/status-labels.js"></script>
  <script src="../shared/page-boot.js"></script>
  <script>
    MerchantPageBoot.boot("coupons", [{ label: "商家工作台" }, { label: "我的卡券" }, { label: "卡券详情" }]);
    MerchantAdapterBoot.ensureAdapterScripts(function () {
      var adapter = MerchantAdapterBoot.getAdapter();
      var id = new URLSearchParams(location.search).get("id") || "coupon_001";
      var c = adapter.getMerchantCouponDetail(id);
      if (!c) return;
      document.getElementById("coupon-title").textContent = c.name;
      document.getElementById("coupon-subtitle").innerHTML = "所属活动：" + c.activityName + ' · <span class="bo-gift-tag">探索礼遇</span>';
      document.getElementById("coupon-status-badge").textContent = c.statusLabel;
      document.getElementById("coupon-metrics").innerHTML =
        '<div class="bo-metric-card"><div class="bo-metric-card__label">发放数量</div><div class="bo-metric-card__value">' + c.issueTotal + '</div></div>' +
        '<div class="bo-metric-card"><div class="bo-metric-card__label">领取数量</div><div class="bo-metric-card__value">' + c.claimedCount + '</div></div>' +
        '<div class="bo-metric-card"><div class="bo-metric-card__label">到店核销</div><div class="bo-metric-card__value">' + c.redeemedCount + '</div></div>' +
        '<div class="bo-metric-card bo-metric-card--highlight"><div class="bo-metric-card__label">核销率</div><div class="bo-metric-card__value">' + c.redemptionRateLabel + '</div></div>';
      document.getElementById("coupon-info").innerHTML =
        '<div class="bo-detail-row"><div class="k">礼遇名称</div><div>' + c.name + '</div></div>' +
        '<div class="bo-detail-row"><div class="k">所属活动</div><div>' + c.activityName + '</div></div>' +
        '<div class="bo-detail-row"><div class="k">有效期</div><div>' + c.startDate + " ~ " + c.endDate + '</div></div>' +
        '<div class="bo-detail-row"><div class="k">当前状态</div><div><span class="badge badge-success">' + c.statusLabel + '</span></div></div>';
      document.getElementById("coupon-desc").textContent = c.description || "游客完成探索后，到店出示礼遇码，由店员扫码核销。";
      document.getElementById("coupon-risk").textContent = "风险提示：" + c.riskHint;
      document.getElementById("recent-body").innerHTML = (c.recentRedemptions || []).map(function (r) {
        return "<tr><td>" + r.claimCode + "</td><td>" + r.userMask + "</td><td>" + (r.redeemedAt || "—") + "</td><td>" +
          MerchantAdapterBoot.redemptionStatusBadge("VERIFIED") + "</td></tr>";
      }).join("") || "<tr><td colspan=\"4\">暂无记录</td></tr>";
    });
  </script>
</body>
</html>
