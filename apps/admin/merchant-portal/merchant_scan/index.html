<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>扫码核销 · AR游伴商家工作台</title>
  <link rel="stylesheet" href="../../shared/backoffice.css" />
</head>
<body>
  <div class="bo-app">
    <div id="bo-topnav"></div>
    <div class="bo-body">
      <div id="bo-sidebar"></div>
      <main class="bo-content">
        <div id="bo-breadcrumb"></div>
        <div class="bo-page-header">
          <h2>扫码核销</h2>
          <p id="scan-subtitle">扫描游客礼遇码完成到店核销，也可手动输入礼遇码</p>
        </div>

        <div class="scan-panel scan-panel--hero">
          <div class="scan-box scan-box--primary">
            <div class="bo-ritual-label">礼遇码核销</div>
            <div class="icon">📷</div>
            <p style="margin:0 0 16px;color:var(--text-secondary);text-align:center;">将礼遇码对准扫描区域<br/>或手动输入礼遇码</p>
            <input class="input input-lg" id="code-input" type="text" placeholder="输入礼遇码，如 LQG-CAFE-1001" style="width:100%;margin-bottom:12px;" />
            <button class="bo-primary-action" id="scan-btn" type="button">确认核销</button>
          </div>
          <div id="scan-result" class="scan-result hidden"></div>
          <div class="bo-help-block" style="margin-top:16px;">
            <h4>可测试核销码</h4>
            <p id="sample-codes-hint">加载中…</p>
          </div>
        </div>

        <section class="card">
          <h3 class="card-title">最近礼遇核销</h3>
          <div class="table-wrap bo-record-list">
            <table class="table">
              <thead><tr><th>礼遇码</th><th>在地礼遇</th><th>状态</th><th>时间</th></tr></thead>
              <tbody id="recent-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="../../shared/backoffice-shell.js"></script>
  <script src="../shared/merchant-adapter-boot.js"></script>
  <script src="../shared/status-labels.js"></script>
  <script src="../shared/page-boot.js"></script>
  <script>
    MerchantPageBoot.boot("scan", [{ label: "商家工作台" }, { label: "扫码核销" }]);

    function renderRecent(adapter, ctx) {
      var rows = adapter.getMerchantRedemptions(ctx.merchantId, { roleKey: ctx.roleKey, staffId: ctx.staffId })
        .filter(function (r) { return r.claimStatus === "USED"; })
        .slice(0, 5);
      document.getElementById("recent-body").innerHTML = rows.length ? rows.map(function (r) {
        return "<tr><td>" + r.claimCode + "</td><td>" + r.couponName + "</td><td>" +
          MerchantAdapterBoot.redemptionStatusBadge("VERIFIED") + "</td><td>" + (r.redeemedAt || r.claimedAt) + "</td></tr>";
      }).join("") : "<tr><td colspan=\"4\"><div class=\"empty-state\"><h4>暂无核销记录</h4></div></td></tr>";
    }

    MerchantAdapterBoot.ensureAdapterScripts(function () {
      var adapter = MerchantAdapterBoot.getAdapter();
      var ctx = MerchantAdapterBoot.getMerchantContext();
      var scanCtx = adapter.getMerchantScanContext(ctx.merchantId, ctx.staffId);
      document.getElementById("scan-subtitle").textContent =
        (scanCtx.merchant ? scanCtx.merchant.name : "门店") + " · 待核销 " + scanCtx.pendingCount + " 张";
      document.getElementById("sample-codes-hint").innerHTML = scanCtx.sampleCodes.map(function (s) {
        return '<button type="button" class="btn" data-code="' + s.code + '" style="margin:4px 4px 4px 0;">' + s.code + "（" + s.hint + "）</button>";
      }).join("");

      document.querySelectorAll("[data-code]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          document.getElementById("code-input").value = btn.getAttribute("data-code");
        });
      });

      renderRecent(adapter, ctx);

      document.getElementById("scan-btn").addEventListener("click", function () {
        var code = document.getElementById("code-input").value.trim();
        var result = adapter.verifyCouponClaim(code, ctx.merchantId, ctx.staffId);
        var box = document.getElementById("scan-result");
        if (result.ok) {
          box.className = "scan-result success";
          box.innerHTML =
            "<strong>核销成功</strong>" +
            "<p>卡券：" + (result.coupon ? result.coupon.name : "—") + "</p>" +
            "<p>用户：" + result.claim.userMask + "</p>" +
            "<p>核销时间：" + result.redeemedAt + "</p>" +
            "<p>核销员：" + result.staffName + "</p>";
        } else {
          box.className = "scan-result";
          box.style.background = "var(--warning-bg)";
          box.style.border = "1px solid #eed0a9";
          box.innerHTML = "<strong>不可核销</strong><p>原因：" + result.message + "</p>";
        }
        box.classList.remove("hidden");
        if (result.ok) {
          document.getElementById("code-input").value = "";
          renderRecent(adapter, ctx);
        }
      });
    });
  </script>
</body>
</html>
